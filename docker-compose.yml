services:
  rab-app:
    build:
      context: .
    image: rab-workflow-assistant:latest
    restart: unless-stopped
    environment:
      PORT: 8000
      RAB_DATA_DIR: /app/data
      RAB_DB_PATH: /app/data/rab.db
      RAB_EXPORT_DIR: /app/data/exports
      SBM_SOURCE_PATH: /app/data/sbm-cache.xlsx
      RAB_BASIC_AUTH_USERNAME: ${RAB_BASIC_AUTH_USERNAME:-}
      RAB_BASIC_AUTH_PASSWORD: ${RAB_BASIC_AUTH_PASSWORD:-}
    volumes:
      - rab_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      rab-app:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  rab_data:
  caddy_data:
  caddy_config:
